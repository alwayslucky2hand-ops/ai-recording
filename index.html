<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus | 智能商務錄製系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root { 
      --primary: #0f172a; 
      --primary-hover: #334155;
      --accent: #2563eb;
      --surface: #ffffff; 
      --bg: #f8fafc; 
      --border: #e2e8f0;
      --text-main: #1e293b;
      --text-muted: #64748b;
    }
    body { background-color: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 20px; color: var(--text-main); }
    
    .card-premium { background: var(--surface); border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 4px 24px rgba(0,0,0,0.03); max-width: 800px; margin: auto; padding: 40px; transition: all 0.3s ease; }
    
    .step-section { display: none; opacity: 0; transition: opacity 0.4s ease-in-out; }
    .step-section.active { display: block; opacity: 1; }
    
    /* 媒體播放器區域 */
    .video-container { position: relative; width: 100%; max-height: 450px; background: #000; border-radius: 12px; margin-bottom: 24px; overflow: hidden; }
    video { width: 100%; height: 100%; object-fit: contain; }
    .status-badge { position: absolute; top: 16px; right: 16px; background: rgba(220, 38, 38, 0.9); color: white; padding: 6px 12px; border-radius: 6px; font-weight: 600; font-size: 13px; display: none; z-index: 10; letter-spacing: 0.5px; display: flex; align-items: center; gap: 6px; }
    .pulse-dot { width: 8px; height: 8px; background-color: white; border-radius: 50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { transform: scale(0.95); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(0.95); opacity: 0.5; } }
    
    /* 表單與按鈕設計 */
    .form-control-lg { border-radius: 8px; border: 1px solid var(--border); padding: 14px 16px; font-size: 15px; box-shadow: none; }
    .form-control-lg:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
    
    .btn-brand { background-color: var(--primary); color: white; font-weight: 500; padding: 12px 24px; border-radius: 8px; border: none; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
    .btn-brand:hover:not(:disabled) { background-color: var(--primary-hover); color: white; }
    .btn-brand:disabled { background-color: #cbd5e1; cursor: not-allowed; }
    
    .btn-outline { background-color: transparent; color: var(--primary); border: 1px solid var(--border); font-weight: 500; padding: 10px 20px; border-radius: 8px; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
    .btn-outline:hover:not(:disabled) { background-color: #f1f5f9; }
    
    .btn-danger-custom { background-color: #ef4444; color: white; border: none; }
    .btn-danger-custom:hover:not(:disabled) { background-color: #dc2626; }
    
    /* 日誌與結果區域 */
    .log-box { height: 160px; overflow-y: auto; background: #f8fafc; color: var(--text-muted); padding: 16px; border-radius: 8px; border: 1px solid var(--border); font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 13px; line-height: 1.6; }
    
    .result-editor { width: 100%; min-height: 300px; padding: 20px; border: 1px solid var(--border); border-radius: 8px; background: #fff; font-size: 15px; line-height: 1.8; color: var(--text-main); resize: vertical; outline: none; transition: border 0.2s; }
    .result-editor:focus { border-color: var(--accent); }
    
    .url-box { display: flex; align-items: center; gap: 10px; background: #f1f5f9; padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border); }
    .url-text { flex-grow: 1; font-family: monospace; font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    details summary { cursor: pointer; padding: 16px; background-color: var(--bg); border-radius: 8px; font-weight: 500; color: var(--text-main); border: 1px solid var(--border); list-style: none; display: flex; align-items: center; gap: 8px; }
    details summary::-webkit-details-marker { display: none; }
  </style>
</head>
<body>

<div class="card-premium">
  <div class="d-flex align-items-center justify-content-center gap-2 mb-5">
    <i data-lucide="layers" style="width: 28px; height: 28px; color: var(--primary);"></i>
    <h2 class="m-0 fw-bold" style="color: var(--primary); letter-spacing: -0.5px;">Nexus</h2>
  </div>
  
  <div class="video-container">
    <div id="recBadge" class="status-badge" style="display: none;">
      <div class="pulse-dot"></div>
      <span>REC</span>
    </div>
    <video id="mediaPlayer" autoplay muted playsinline></video>
  </div>

  <div id="step-auth" class="step-section active">
    <div class="mb-4">
      <label class="form-label fw-bold text-secondary">工作信箱</label>
      <div class="d-flex gap-2">
        <input type="email" id="authEmail" class="form-control form-control-lg" placeholder="name@company.com">
        <button class="btn-outline" id="btnSendCode" onclick="sendCode()">
          <i data-lucide="mail" style="width:18px;"></i> 取得驗證碼
        </button>
      </div>
    </div>
    <div class="mb-4" id="codeGroup" style="display:none;">
      <label class="form-label fw-bold text-secondary">驗證碼</label>
      <input type="text" id="authCode" class="form-control form-control-lg mb-3" placeholder="請輸入 6 位數代碼">
      <button class="btn-brand w-100" id="btnVerify" onclick="verifyCode()">
        <i data-lucide="log-in" style="width:18px;"></i> 驗證並登入
      </button>
    </div>
    <div id="authMsg" class="text-center mt-3 fs-6"></div>
  </div>

  <div id="step-setup" class="step-section">
    <div class="mb-4">
      <label class="form-label fw-bold text-secondary">所屬單位</label>
      <input type="text" id="setupCompany" class="form-control form-control-lg" placeholder="例如：產品研發部">
    </div>
    <div class="mb-4">
      <label class="form-label fw-bold text-secondary">與會人員</label>
      <textarea id="setupAttendees" class="form-control form-control-lg" rows="2" placeholder="請輸入參與者姓名..."></textarea>
    </div>
    <button class="btn-brand w-100" id="btnStartSetup" onclick="startMeeting()">
      <i data-lucide="play-circle" style="width:20px;"></i> 建立會議並準備錄製
    </button>
  </div>

  <div id="step-recording" class="step-section">
    <div class="d-flex justify-content-center flex-wrap gap-2 mb-4">
      <button class="btn-outline" id="btnSwitchSource" onclick="switchSourceAction()">
        <i data-lucide="camera" style="width:18px;" id="icon-source"></i> <span id="text-source">切換裝置</span>
      </button>
      <button class="btn-outline" id="btnToggleVideo" onclick="toggleVideo()">
        <i data-lucide="eye" style="width:18px;" id="icon-video"></i> <span id="text-video">開啟畫面</span>
      </button>
    </div>

    <div class="d-flex justify-content-center flex-wrap gap-3 mb-4">
      <button class="btn-outline" id="btnPause" onclick="pauseMeeting()" style="border-color: #f59e0b; color: #d97706;">
        <i data-lucide="pause" style="width:18px;"></i> 暫停
      </button>
      <button class="btn-outline" id="btnResume" onclick="resumeMeeting()" style="display:none; border-color: #10b981; color: #059669;">
        <i data-lucide="play" style="width:18px;"></i> 繼續
      </button>
      <button class="btn-brand btn-danger-custom" id="btnStop" onclick="stopMeeting()">
        <i data-lucide="square" style="width:18px; fill: currentColor;"></i> 結束會議
      </button>
    </div>

    <label class="form-label fw-bold text-secondary fs-6">執行日誌</label>
    <div id="systemLog" class="log-box mb-2">系統啟動中...<br></div>
  </div>
  
  <div id="step-result" class="step-section mt-2">
    
    <div class="mb-4">
      <label class="form-label fw-bold text-secondary">雲端錄影檔案 (公開檢視)</label>
      <div class="url-box">
        <i data-lucide="link" style="width:16px; color: var(--text-muted);"></i>
        <div class="url-text" id="videoUrlText">載入中...</div>
        <button class="btn-outline" style="padding: 6px 12px; font-size: 13px;" onclick="copyVideoUrl()">複製</button>
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label fw-bold text-secondary d-flex justify-content-between align-items-end">
        <span>專業會議總結 (可自由編輯)</span>
      </label>
      <textarea id="finalSummary" class="result-editor"></textarea>
      
      <div class="d-flex gap-2 mt-3 justify-content-end flex-wrap">
        <button class="btn-outline" onclick="saveSummary()" id="btnSaveSummary">
          <i data-lucide="save" style="width:16px;"></i> 儲存變更至資料庫
        </button>
        <button class="btn-brand" onclick="exportToDoc()" id="btnExportDoc">
          <i data-lucide="file-text" style="width:16px;"></i> 建立 Google 文件
        </button>
      </div>
      <div id="actionFeedback" class="text-end mt-2 fs-6 text-success" style="height: 20px;"></div>
    </div>
    
    <details class="mt-4">
      <summary><i data-lucide="chevron-down" style="width:18px;"></i> 檢視完整畫面描述與逐字稿</summary>
      <div id="fullDetails" class="p-3 mt-2 border rounded bg-white text-muted" style="white-space: pre-wrap; font-size: 13px; line-height: 1.6; max-height: 400px; overflow-y: auto;"></div>
    </details>
  </div>

</div>

<script>
  // 初始化 Lucide 圖示
  lucide.createIcons();

  // ==========================================
  // ⚠️ 請填入你的 GAS URL
  // ==========================================
  const GAS_URL = "https://script.google.com/macros/s/AKfycbw4h-FBKYPtMeth5HGAcoH9s1sJOQSeijLTi8qAAPYViGaL8iwe0YPuiGbBs8_wOb4i/exec";

  let loggedInEmail = "";
  let currentStream = null;
  let mediaRecorder = null;
  let chunkInterval;
  let chunkIndex = 1;
  let meetingData = { folderId: '', rowIndex: 0, meetingName: '' };
  let isRecording = false;
  
  let isVideoEnabled = false; 
  let wakeLock = null;
  let activeProcessingTasks = new Set();
  let finalVideoUrls = "";

  const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
  let mobileFacingMode = "user"; 
  let desktopSource = "camera";  

  const mediaPlayer = document.getElementById('mediaPlayer');
  const logBox = document.getElementById('systemLog');
  const recBadge = document.getElementById('recBadge');

  window.onload = async () => {
    updateSourceButtonUI();
    try {
      await acquireStream();
      logMsg("authMsg", "認證設備成功，目前為純語音模式", "text-success");
    } catch (err) {
      logMsg("authMsg", "請允許瀏覽器存取麥克風與相機權限", "text-danger");
    }
  };

  function updateSourceButtonUI() {
    document.getElementById('text-source').innerText = isMobile ? "切換鏡頭方向" : "切換電腦畫面";
    document.getElementById('icon-source').setAttribute('data-lucide', isMobile ? "smartphone" : "monitor");
    lucide.createIcons();
  }

  function switchStep(stepId) {
    document.querySelectorAll('.step-section').forEach(el => el.classList.remove('active'));
    document.getElementById(stepId).classList.add('active');
  }

  function log(msg) {
    const time = new Date().toLocaleTimeString('zh-TW', { hour12: false });
    logBox.innerHTML += `[${time}] ${msg}<br>`;
    logBox.scrollTop = logBox.scrollHeight;
  }

  function logMsg(elementId, msg, colorClass) {
    const el = document.getElementById(elementId);
    el.innerText = msg;
    el.className = `text-center mt-2 fs-6 ${colorClass}`;
  }

  async function callGasAPI(payload) {
    try {
      const response = await fetch(GAS_URL, {
        method: "POST",
        redirect: "follow", 
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      });
      return await response.json();
    } catch (err) {
      throw new Error("網路請求失敗：" + err.message);
    }
  }

  // === 登入與驗證 ===
  async function sendCode() {
    const email = document.getElementById('authEmail').value;
    if (!email) return alert("請輸入信箱");
    document.getElementById('btnSendCode').disabled = true;
    logMsg("authMsg", "驗證碼發送中...", "text-muted");
    try {
      const res = await callGasAPI({ action: "sendCode", email: email });
      if (res.status === 'success') {
        document.getElementById('codeGroup').style.display = 'block';
        logMsg("authMsg", "已發送至信箱", "text-success");
      } else throw new Error(res.message);
    } catch (err) {
      logMsg("authMsg", "發送失敗", "text-danger");
      document.getElementById('btnSendCode').disabled = false;
    }
  }

  async function verifyCode() {
    const email = document.getElementById('authEmail').value;
    const code = document.getElementById('authCode').value;
    if (!code) return alert("請輸入驗證碼");
    document.getElementById('btnVerify').disabled = true;
    logMsg("authMsg", "驗證中...", "text-muted");
    try {
      const res = await callGasAPI({ action: "verifyCode", email: email, code: code });
      if (res.status === 'success') {
        loggedInEmail = email; 
        switchStep('step-setup'); 
      } else throw new Error(res.message);
    } catch (err) {
      logMsg("authMsg", "驗證失敗: 代碼錯誤", "text-danger");
      document.getElementById('btnVerify').disabled = false;
    }
  }

  // === 防休眠 ===
  async function requestWakeLock() {
    try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
  }
  function releaseWakeLock() {
    if (wakeLock !== null) wakeLock.release().then(() => { wakeLock = null; });
  }

  // === 獲取串流 ===
  async function acquireStream() {
    if (currentStream) currentStream.getTracks().forEach(track => track.stop());
    const constraints = { audio: true };
    try {
      if (isMobile) {
        constraints.video = { facingMode: mobileFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } };
        currentStream = await navigator.mediaDevices.getUserMedia(constraints);
      } else {
        if (desktopSource === "camera") {
          constraints.video = { width: { ideal: 1280 }, height: { ideal: 720 } };
          currentStream = await navigator.mediaDevices.getUserMedia(constraints);
        } else {
          currentStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
          currentStream.getVideoTracks()[0].onended = () => {
            if (isRecording) {
              log("畫面分享中斷，切回視訊鏡頭");
              desktopSource = "camera";
              acquireStream().then(() => { if (isRecording) startChunkRecording(); });
            }
          };
        }
      }
      mediaPlayer.srcObject = currentStream;
      mediaPlayer.muted = true; 
      
      const videoTrack = currentStream.getVideoTracks()[0];
      if (videoTrack) videoTrack.enabled = isVideoEnabled; 
    } catch (err) {
      throw err;
    }
  }

  async function switchSourceAction() {
    const wasRecording = isRecording;
    if (wasRecording && mediaRecorder && mediaRecorder.state === "recording") {
      log("切換畫面中...");
      mediaRecorder.stop(); 
      clearTimeout(chunkInterval);
    }

    if (isMobile) mobileFacingMode = (mobileFacingMode === "user") ? "environment" : "user";
    else desktopSource = (desktopSource === "camera") ? "screen" : "camera";

    try {
      await acquireStream();
      if (wasRecording) {
        log("畫面切換完成，繼續錄製");
        startChunkRecording();
      }
    } catch (e) {
      log("切換失敗，請確認權限");
    }
  }

  function toggleVideo() {
    if (currentStream) {
      const videoTrack = currentStream.getVideoTracks()[0];
      if (videoTrack) {
        isVideoEnabled = !isVideoEnabled;
        videoTrack.enabled = isVideoEnabled;
        const textEl = document.getElementById('text-video');
        const iconEl = document.getElementById('icon-video');
        
        if (isVideoEnabled) {
          textEl.innerText = "關閉畫面 (純錄音)";
          iconEl.setAttribute('data-lucide', 'eye-off');
        } else {
          textEl.innerText = "開啟畫面預覽";
          iconEl.setAttribute('data-lucide', 'eye');
        }
        lucide.createIcons();
      }
    }
  }

  // === 啟動與操作 ===
  async function startMeeting() {
    const company = document.getElementById('setupCompany').value;
    const attendees = document.getElementById('setupAttendees').value;
    if (!company || !attendees) return alert("請填寫必要資訊");

    document.getElementById('btnStartSetup').disabled = true;
    document.getElementById('btnStartSetup').innerHTML = `<i data-lucide="loader" class="pulse-dot" style="background:none;"></i> 連線中...`;
    lucide.createIcons();

    try {
      const res = await callGasAPI({ action: "initMeeting", email: loggedInEmail, company: company, attendees: attendees });
      if (res.status === 'success') {
        meetingData = res.data;
        switchStep('step-recording'); 
        
        if (!currentStream) await acquireStream();
        
        if (currentStream && currentStream.getAudioTracks().length > 0) {
          isRecording = true;
          chunkIndex = 1;
          recBadge.style.display = 'flex';
          
          await requestWakeLock(); 
          log("系統啟動：每分鐘執行雙軌並行傳輸");
          startChunkRecording();
        }
      } else throw new Error(res.message);
    } catch (err) {
      alert("啟動失敗：" + err.message);
      const btn = document.getElementById('btnStartSetup');
      btn.disabled = false;
      btn.innerHTML = `<i data-lucide="play-circle" style="width:20px;"></i> 建立會議並準備錄製`;
      lucide.createIcons();
    }
  }

  function pauseMeeting() {
    if (mediaRecorder && mediaRecorder.state === "recording") {
      log("錄製暫停");
      mediaRecorder.stop(); 
      clearTimeout(chunkInterval);
      document.getElementById('btnPause').style.display = 'none';
      document.getElementById('btnResume').style.display = 'flex';
      recBadge.style.background = "#f59e0b";
      recBadge.querySelector('span').innerText = "PAUSED";
    }
  }

  function resumeMeeting() {
    log("錄製恢復");
    if (currentStream) {
      startChunkRecording(); 
      document.getElementById('btnResume').style.display = 'none';
      document.getElementById('btnPause').style.display = 'flex';
      recBadge.style.background = "rgba(220, 38, 38, 0.9)";
      recBadge.querySelector('span').innerText = "REC";
    }
  }

  function startChunkRecording() {
    if (!isRecording || !currentStream) return;
    let recordedChunks = [];
    const mimeType = MediaRecorder.isTypeSupported('video/mp4') ? 'video/mp4' : 'video/webm';
    mediaRecorder = new MediaRecorder(currentStream, { mimeType: mimeType });
    
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      if (recordedChunks.length > 0) {
        const blob = new Blob(recordedChunks, { type: mimeType });
        processAndUploadChunk(blob, mimeType, chunkIndex);
        chunkIndex++;
      }
      if (isRecording) startChunkRecording(); 
    };

    try {
      mediaRecorder.start();
      chunkInterval = setTimeout(() => { if (mediaRecorder.state === "recording") mediaRecorder.stop(); }, 60000); 
    } catch (err) {}
  }

  function processAndUploadChunk(blob, mimeType, currentIndex) {
    log(`> 處理區段 ${currentIndex}：並行傳輸中...`);
    const taskPromise = new Promise((resolve) => {
      const reader = new FileReader();
      reader.readAsDataURL(blob);
      reader.onloadend = async () => {
        const base64Data = reader.result.split(',')[1];
        
        const p1 = callGasAPI({ action: "saveDrive", base64Data: base64Data, mimeType: mimeType, folderId: meetingData.folderId, rowIndex: meetingData.rowIndex, chunkIndex: currentIndex });
        const p2 = callGasAPI({ action: "recognizeAI", base64Data: base64Data, mimeType: mimeType, rowIndex: meetingData.rowIndex, chunkIndex: currentIndex });
        
        await Promise.all([p1, p2]);
        log(`- 區段 ${currentIndex} 寫入完成`);
        resolve();
      };
    });
    activeProcessingTasks.add(taskPromise);
    taskPromise.then(() => activeProcessingTasks.delete(taskPromise));
  }

  // === 結束與產出 ===
  async function stopMeeting() {
    isRecording = false; 
    clearTimeout(chunkInterval);
    recBadge.style.display = 'none';
    releaseWakeLock(); 
    
    const btnStop = document.getElementById('btnStop');
    btnStop.disabled = true;
    btnStop.innerHTML = `<i data-lucide="loader" style="width:18px;"></i> 統整中...`;
    lucide.createIcons();

    document.getElementById('btnPause').style.display = 'none';
    document.getElementById('btnResume').style.display = 'none';
    document.getElementById('btnSwitchSource').style.display = 'none';
    document.getElementById('btnToggleVideo').style.display = 'none';

    log("提取最終區段資料...");

    const onStopPromise = new Promise(resolve => {
      if (mediaRecorder && (mediaRecorder.state === "recording" || mediaRecorder.state === "paused")) {
        const originalOnStop = mediaRecorder.onstop;
        mediaRecorder.onstop = (e) => { if(originalOnStop) originalOnStop(e); resolve(); };
        mediaRecorder.stop(); 
      } else resolve();
    });

    await onStopPromise;
    if (currentStream) currentStream.getTracks().forEach(track => track.stop());

    if (activeProcessingTasks.size > 0) {
      log(`等待 ${activeProcessingTasks.size} 筆背景任務完成寫入...`);
      while(activeProcessingTasks.size > 0) {
        await Promise.all(Array.from(activeProcessingTasks));
      }
    }

    log("呼叫 AI 進行總結...");
    
    try {
      const res = await callGasAPI({ action: "finalizeMeeting", rowIndex: meetingData.rowIndex, email: loggedInEmail });
      if (res.status === 'success') {
        switchStep('step-result'); 
        
        // 填入資料
        document.getElementById('finalSummary').value = res.data.summary;
        document.getElementById('fullDetails').innerText = res.data.details;
        
        // 處理 URL 顯示
        finalVideoUrls = res.data.videoUrls || "尚未產生錄影檔案";
        document.getElementById('videoUrlText').innerText = finalVideoUrls.split(',')[0]; // 只顯示第一段作代表，複製時複製全部
        
      } else {
        log("總結失敗: " + res.message);
        btnStop.innerHTML = "總結失敗";
      }
    } catch(err) {
      log("異常: " + err.message);
    }
  }

  // === 擴充操作：儲存、匯出、複製 ===
  
  function copyVideoUrl() {
    navigator.clipboard.writeText(finalVideoUrls).then(() => {
      showFeedback("已複製影片網址");
    });
  }

  async function saveSummary() {
    const btn = document.getElementById('btnSaveSummary');
    btn.disabled = true;
    btn.innerHTML = `<i data-lucide="loader" style="width:16px;"></i> 儲存中...`;
    lucide.createIcons();
    
    const newSummary = document.getElementById('finalSummary').value;
    try {
      await callGasAPI({ action: "updateSummary", rowIndex: meetingData.rowIndex, newSummary: newSummary });
      showFeedback("變更已成功同步至資料庫");
    } catch(err) {
      showFeedback("儲存失敗", true);
    }
    btn.disabled = false;
    btn.innerHTML = `<i data-lucide="save" style="width:16px;"></i> 儲存變更至資料庫`;
    lucide.createIcons();
  }

  async function exportToDoc() {
    const btn = document.getElementById('btnExportDoc');
    btn.disabled = true;
    btn.innerHTML = `<i data-lucide="loader" style="width:16px;"></i> 建立中...`;
    lucide.createIcons();
    
    const summary = document.getElementById('finalSummary').value;
    const details = document.getElementById('fullDetails').innerText;
    
    try {
      const res = await callGasAPI({ action: "createDoc", meetingName: meetingData.meetingName, summary: summary, details: details });
      if(res.status === 'success') {
        showFeedback("文件已建立！");
        window.open(res.data, '_blank'); // 另開視窗前往 Doc
      }
    } catch(err) {
      showFeedback("建立失敗", true);
    }
    btn.disabled = false;
    btn.innerHTML = `<i data-lucide="file-text" style="width:16px;"></i> 建立 Google 文件`;
    lucide.createIcons();
  }

  function showFeedback(msg, isError = false) {
    const el = document.getElementById('actionFeedback');
    el.innerText = msg;
    el.className = `text-end mt-2 fs-6 ${isError ? 'text-danger' : 'text-success'}`;
    setTimeout(() => { el.innerText = ""; }, 3000);
  }
</script>

</body>
</html>
