<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 智能商務錄製系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --primary-color: #2563eb; --surface-color: #ffffff; --bg-color: #f8fafc; }
    body { background-color: var(--bg-color); font-family: 'Segoe UI', system-ui, sans-serif; padding: 20px; color: #1e293b; }
    
    /* 2026 現代卡片設計：大圓角、柔和陰影 */
    .card-modern { background: var(--surface-color); border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); max-width: 800px; margin: auto; padding: 35px; border: none; transition: all 0.3s ease; }
    
    /* UI 漸進式揭露區塊 */
    .step-section { display: none; opacity: 0; transition: opacity 0.4s ease-in-out; }
    .step-section.active { display: block; opacity: 1; }
    
    /* 影片與狀態徽章 */
    .video-container { position: relative; width: 100%; max-height: 450px; background: #0f172a; border-radius: 16px; margin-bottom: 24px; overflow: hidden; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
    video { width: 100%; height: 100%; object-fit: contain; }
    .status-badge { position: absolute; top: 16px; right: 16px; background: rgba(239, 68, 68, 0.9); color: white; padding: 6px 14px; border-radius: 8px; font-weight: 600; font-size: 14px; display: none; z-index: 10; letter-spacing: 1px; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4); }
    
    /* 無障礙大按鍵與輸入框 */
    .form-control-lg { border-radius: 12px; border: 1px solid #cbd5e1; padding: 14px 20px; font-size: 16px; }
    .form-control-lg:focus { box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); border-color: var(--primary-color); }
    .btn-custom { font-weight: 600; padding: 14px 24px; border-radius: 12px; font-size: 16px; transition: transform 0.1s, box-shadow 0.2s; }
    .btn-custom:active { transform: scale(0.98); }
    
    /* AI 透明度日誌區塊 */
    .log-box { height: 200px; overflow-y: auto; background: #1e293b; color: #4ade80; padding: 20px; border-radius: 12px; font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.6; border: 1px solid #334155; }
    
    /* 總結區塊細節 */
    summary { cursor: pointer; padding: 14px; background-color: #f1f5f9; border-radius: 12px; font-weight: 600; color: #475569; border: 1px solid #e2e8f0; }
    summary:hover { background-color: #e2e8f0; }
  </style>
</head>
<body>

<div class="card-modern">
  <h2 class="text-center mb-4 fw-bold" style="color: #0f172a;">✨ AI 智能商務錄製系統</h2>
  
  <div class="video-container">
    <div id="recBadge" class="status-badge">REC 🔴</div>
    <video id="mediaPlayer" autoplay muted playsinline></video>
  </div>

  <div id="step-auth" class="step-section active">
    <div class="mb-3">
      <label class="form-label fw-bold">1. 請輸入 Email 登入：</label>
      <div class="input-group">
        <input type="email" id="authEmail" class="form-control form-control-lg" placeholder="name@company.com">
        <button class="btn btn-outline-primary px-4 fw-bold" id="btnSendCode" onclick="sendCode()">發送驗證碼</button>
      </div>
    </div>
    <div class="mb-4" id="codeGroup" style="display:none;">
      <label class="form-label fw-bold text-primary">輸入收到的驗證碼：</label>
      <input type="text" id="authCode" class="form-control form-control-lg mb-3" placeholder="6位數驗證碼">
      <button class="btn btn-primary w-100 btn-custom" id="btnVerify" onclick="verifyCode()">驗證並登入</button>
    </div>
    <div id="authMsg" class="text-center fw-bold mt-2"></div>
  </div>

  <div id="step-setup" class="step-section">
    <h5 class="fw-bold mb-3 text-primary">2. 設定本次會議基本資訊</h5>
    <div class="mb-3">
      <label class="form-label fw-bold">單位 (公司-部門名稱)：</label>
      <input type="text" id="setupCompany" class="form-control form-control-lg" placeholder="例如：AI 科技 - 研發部">
    </div>
    <div class="mb-4">
      <label class="form-label fw-bold">與會人員名單：</label>
      <textarea id="setupAttendees" class="form-control form-control-lg" rows="2" placeholder="例如：王小明、李大華..."></textarea>
    </div>
    <button class="btn btn-primary w-100 btn-custom fs-5" id="btnStartSetup" onclick="startMeeting()">🚀 啟動錄製與 AI 辨識</button>
  </div>

  <div id="step-recording" class="step-section">
    <div class="d-flex justify-content-center flex-wrap gap-2 mb-4">
      <button class="btn btn-outline-secondary fw-bold" id="btnSwitchSource" onclick="switchSourceAction()">🔄 切換鏡頭</button>
      <button class="btn btn-outline-secondary fw-bold" id="btnToggleVideo" onclick="toggleVideo()">👀 開啟預覽畫面</button>
    </div>

    <div class="d-flex justify-content-center flex-wrap gap-3 mb-4">
      <button class="btn btn-warning btn-custom text-dark" id="btnPause" onclick="pauseMeeting()">⏸️ 暫停錄製</button>
      <button class="btn btn-success btn-custom" id="btnResume" onclick="resumeMeeting()" style="display:none;">▶️ 繼續錄製</button>
      <button class="btn btn-danger btn-custom" id="btnStop" onclick="stopMeeting()">⏹️ 結束並產出總結</button>
    </div>

    <h6 class="fw-bold text-secondary">系統狀態監控 (雙軌完全同步並行中)：</h6>
    <div id="systemLog" class="log-box mb-2">系統啟動中...<br></div>
  </div>
  
  <div id="step-result" class="step-section mt-4">
    <h4 class="fw-bold text-success mb-3">📝 專業會議總結：</h4>
    <div id="finalSummary" class="p-4 border border-success rounded bg-white shadow-sm" style="white-space: pre-wrap; font-size: 16px; line-height: 1.8;"></div>
    
    <details class="mt-4">
      <summary>📄 點擊展開：完整畫面描述與逐字稿</summary>
      <div id="fullDetails" class="p-3 mt-2 border rounded bg-white text-dark" style="white-space: pre-wrap; font-size: 14px; line-height: 1.6;"></div>
    </details>
  </div>

</div>

<script>
  // ==========================================
  // GAS API URL (已嚴格綁定)
  // ==========================================
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwOQx2kVxAJSMoC6Mpd-k7OtwQWD_4RrAofhJu00XYnHn5RCi3VfLbCoSnqcP3LhTE/exec";

  // 全域變數
  let loggedInEmail = "";
  let currentStream = null;
  let mediaRecorder = null;
  let chunkInterval;
  let chunkIndex = 1;
  let meetingData = { folderId: '', rowIndex: 0 };
  let isRecording = false;
  
  // 核心邏輯：預設關閉畫面，純錄音
  let isVideoEnabled = false; 
  let wakeLock = null;
  let activeProcessingTasks = new Set();

  const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
  let mobileFacingMode = "user"; 
  let desktopSource = "camera";  

  const mediaPlayer = document.getElementById('mediaPlayer');
  const logBox = document.getElementById('systemLog');
  const recBadge = document.getElementById('recBadge');

  // === 1. 頁面載入：立即要求權限並顯示預覽 (預設純錄音) ===
  window.onload = async () => {
    document.getElementById('btnSwitchSource').innerText = isMobile ? "🔄 切換後鏡頭" : "💻 切換電腦螢幕";
    try {
      await acquireStream();
      logMsg("authMsg", "✅ 設備授權成功！目前為【預設純語音模式】", "text-success");
    } catch (err) {
      logMsg("authMsg", "❌ 無法取得麥克風/鏡頭權限，請檢查瀏覽器設定！", "text-danger");
    }
  };

  // UI 切換邏輯
  function switchStep(stepId) {
    document.querySelectorAll('.step-section').forEach(el => el.classList.remove('active'));
    document.getElementById(stepId).classList.add('active');
  }

  function log(msg) {
    const time = new Date().toLocaleTimeString('zh-TW', { hour12: false });
    logBox.innerHTML += `[${time}] ${msg}<br>`;
    logBox.scrollTop = logBox.scrollHeight;
  }

  function logMsg(elementId, msg, colorClass) {
    const el = document.getElementById(elementId);
    el.innerText = msg;
    el.className = `text-center fw-bold mt-2 ${colorClass}`;
  }

  // 共用 API 呼叫
  async function callGasAPI(payload) {
    try {
      const response = await fetch(GAS_URL, {
        method: "POST",
        redirect: "follow", 
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      });
      return await response.json();
    } catch (err) {
      throw new Error("API 請求失敗：" + err.message);
    }
  }

  // === 2. 登入與驗證邏輯 ===
  async function sendCode() {
    const email = document.getElementById('authEmail').value;
    if (!email) return alert("請輸入 Email！");
    
    document.getElementById('btnSendCode').disabled = true;
    logMsg("authMsg", "⏳ 驗證碼發送中，請稍候...", "text-primary");
    
    try {
      const res = await callGasAPI({ action: "sendCode", email: email });
      if (res.status === 'success') {
        document.getElementById('codeGroup').style.display = 'block';
        logMsg("authMsg", "✅ " + res.data, "text-success");
      } else throw new Error(res.message);
    } catch (err) {
      logMsg("authMsg", "❌ 發送失敗: " + err.message, "text-danger");
      document.getElementById('btnSendCode').disabled = false;
    }
  }

  async function verifyCode() {
    const email = document.getElementById('authEmail').value;
    const code = document.getElementById('authCode').value;
    if (!code) return alert("請輸入驗證碼！");
    
    document.getElementById('btnVerify').disabled = true;
    logMsg("authMsg", "⏳ 驗證中...", "text-primary");
    
    try {
      const res = await callGasAPI({ action: "verifyCode", email: email, code: code });
      if (res.status === 'success') {
        loggedInEmail = email; // 儲存 Email 供後續寫入
        switchStep('step-setup'); // 進入設定步驟
      } else throw new Error(res.message);
    } catch (err) {
      logMsg("authMsg", "❌ 驗證失敗: " + err.message, "text-danger");
      document.getElementById('btnVerify').disabled = false;
    }
  }

  // === 防休眠 ===
  async function requestWakeLock() {
    try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
  }
  function releaseWakeLock() {
    if (wakeLock !== null) wakeLock.release().then(() => { wakeLock = null; });
  }
  document.addEventListener('visibilitychange', async () => {
    if (wakeLock !== null && document.visibilityState === 'visible' && isRecording) await requestWakeLock(); 
  });

  // === 獲取串流引擎 ===
  async function acquireStream() {
    if (currentStream) currentStream.getTracks().forEach(track => track.stop());
    const constraints = { audio: true };
    try {
      if (isMobile) {
        constraints.video = { facingMode: mobileFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } };
        currentStream = await navigator.mediaDevices.getUserMedia(constraints);
      } else {
        if (desktopSource === "camera") {
          constraints.video = { width: { ideal: 1280 }, height: { ideal: 720 } };
          currentStream = await navigator.mediaDevices.getUserMedia(constraints);
        } else {
          currentStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
          currentStream.getVideoTracks()[0].onended = () => {
            if (isRecording) {
              log("⚠️ 螢幕分享中斷，切回視訊鏡頭...");
              desktopSource = "camera";
              document.getElementById('btnSwitchSource').innerText = "💻 切換電腦螢幕";
              acquireStream().then(() => { if (isRecording) startChunkRecording(); });
            }
          };
        }
      }
      mediaPlayer.srcObject = currentStream;
      mediaPlayer.muted = true; 
      
      const videoTrack = currentStream.getVideoTracks()[0];
      if (videoTrack) videoTrack.enabled = isVideoEnabled; // 預設為 false
    } catch (err) {
      throw err;
    }
  }

  async function switchSourceAction() {
    const wasRecording = isRecording;
    if (wasRecording && mediaRecorder && mediaRecorder.state === "recording") {
      log("🔄 切換畫面中，切割當前檔案...");
      mediaRecorder.stop(); 
      clearTimeout(chunkInterval);
    }

    if (isMobile) {
      mobileFacingMode = (mobileFacingMode === "user") ? "environment" : "user";
      document.getElementById('btnSwitchSource').innerText = (mobileFacingMode === "user") ? "🔄 切換後鏡頭" : "🔄 切換前鏡頭";
    } else {
      desktopSource = (desktopSource === "camera") ? "screen" : "camera";
      document.getElementById('btnSwitchSource').innerText = (desktopSource === "camera") ? "💻 切換電腦螢幕" : "📹 切換視訊鏡頭";
    }

    try {
      await acquireStream();
      if (wasRecording) {
        log("✅ 畫面切換完成，無縫繼續錄製...");
        startChunkRecording();
      }
    } catch (e) {
      log("❌ 切換失敗，請確認權限。");
    }
  }

  function toggleVideo() {
    if (currentStream) {
      const videoTrack = currentStream.getVideoTracks()[0];
      if (videoTrack) {
        isVideoEnabled = !isVideoEnabled;
        videoTrack.enabled = isVideoEnabled;
        const btn = document.getElementById('btnToggleVideo');
        if (isVideoEnabled) {
          btn.innerText = "🙈 關閉畫面 (僅錄音)";
          btn.classList.replace('btn-outline-secondary', 'btn-secondary');
          btn.classList.add('text-white');
        } else {
          btn.innerText = "👀 開啟預覽畫面";
          btn.classList.replace('btn-secondary', 'btn-outline-secondary');
          btn.classList.remove('text-white');
        }
      }
    }
  }

  // === 3. 啟動會議 (錄製開始) ===
  async function startMeeting() {
    const company = document.getElementById('setupCompany').value;
    const attendees = document.getElementById('setupAttendees').value;
    
    if (!company || !attendees) return alert("請填寫單位與與會人員名單！");

    document.getElementById('btnStartSetup').disabled = true;
    document.getElementById('btnStartSetup').innerText = "⏳ 雲端連線中...";

    try {
      // 呼叫後端建立列，寫入 A, B, C, D, E
      const res = await callGasAPI({ 
        action: "initMeeting", 
        email: loggedInEmail,
        company: company,
        attendees: attendees
      });
      
      if (res.status === 'success') {
        meetingData = res.data;
        switchStep('step-recording'); // 切換到錄製介面
        
        if (!currentStream) await acquireStream();
        
        if (currentStream && currentStream.getAudioTracks().length > 0) {
          isRecording = true;
          chunkIndex = 1;
          recBadge.style.display = 'block';
          
          await requestWakeLock(); 
          log("▶️ 錄製正式開始！系統將每分鐘進行雙軌並行傳輸。");
          startChunkRecording();
        } else {
          throw new Error("無法偵測到麥克風音軌。");
        }
      } else {
        throw new Error(res.message);
      }
    } catch (err) {
      alert("❌ 啟動失敗：" + err.message);
      document.getElementById('btnStartSetup').disabled = false;
      document.getElementById('btnStartSetup').innerText = "🚀 啟動錄製與 AI 辨識";
    }
  }

  // 暫停與繼續
  function pauseMeeting() {
    if (mediaRecorder && mediaRecorder.state === "recording") {
      log("⏸️ 錄製暫停。切割並上傳當前檔案...");
      mediaRecorder.stop(); 
      clearTimeout(chunkInterval);
      
      document.getElementById('btnPause').style.display = 'none';
      document.getElementById('btnResume').style.display = 'inline-block';
      recBadge.style.background = "rgba(245, 158, 11, 0.9)";
      recBadge.innerText = "PAUSE ⏸️";
    }
  }

  function resumeMeeting() {
    log("▶️ 錄製恢復...");
    if (currentStream) {
      startChunkRecording(); 
      document.getElementById('btnResume').style.display = 'none';
      document.getElementById('btnPause').style.display = 'inline-block';
      recBadge.style.background = "rgba(239, 68, 68, 0.9)";
      recBadge.innerText = "REC 🔴";
    }
  }

  // 切割引擎
  function startChunkRecording() {
    if (!isRecording || !currentStream) return;
    let recordedChunks = [];
    
    const mimeType = MediaRecorder.isTypeSupported('video/mp4') ? 'video/mp4' : 'video/webm';
    mediaRecorder = new MediaRecorder(currentStream, { mimeType: mimeType });
    
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      if (recordedChunks.length > 0) {
        const blob = new Blob(recordedChunks, { type: mimeType });
        processAndUploadChunk(blob, mimeType, chunkIndex);
        chunkIndex++;
      }
      if (isRecording) startChunkRecording(); 
    };

    try {
      mediaRecorder.start();
      chunkInterval = setTimeout(() => {
        if (mediaRecorder.state === "recording") mediaRecorder.stop();
      }, 60000); 
    } catch (err) {
      log("❌ 錄影引擎啟動失敗：" + err.message);
    }
  }

  // === 4. 雙軌並行與任務追蹤鎖 ===
  function processAndUploadChunk(blob, mimeType, currentIndex) {
    log(`⏳ 第 ${currentIndex} 分鐘切片：【雙軌同步】雲端建檔與AI辨識啟動...`);
    
    const taskPromise = new Promise((resolve) => {
      const reader = new FileReader();
      reader.readAsDataURL(blob);
      reader.onloadend = async () => {
        const base64Data = reader.result.split(',')[1];
        
        // 軌道一：雲端建檔 (G欄)
        const p1 = callGasAPI({
          action: "saveDrive", base64Data: base64Data, mimeType: mimeType, folderId: meetingData.folderId, rowIndex: meetingData.rowIndex, chunkIndex: currentIndex
        }).then(res => {
          if(res.status === 'success') log(`📁 軌道一 [第${currentIndex}分鐘]：建檔成功`);
          else log(`❌ 建檔失敗: ` + res.message);
        }).catch(err => log(`❌ 雲端錯誤: ` + err.message));

        // 軌道二：AI 辨識 (H欄)
        const p2 = callGasAPI({
          action: "recognizeAI", base64Data: base64Data, mimeType: mimeType, rowIndex: meetingData.rowIndex, chunkIndex: currentIndex
        }).then(res => {
          if(res.status === 'success') log(`🧠 軌道二 [第${currentIndex}分鐘]：AI辨識寫入成功`);
          else log(`❌ AI辨識失敗: ` + res.message);
        }).catch(err => log(`❌ AI錯誤: ` + err.message));
        
        await Promise.all([p1, p2]);
        resolve(); // 兩個軌道都完成，任務解鎖
      };
    });

    activeProcessingTasks.add(taskPromise);
    taskPromise.then(() => activeProcessingTasks.delete(taskPromise));
  }

  // === 5. 結束與嚴格等待寫入 ===
  async function stopMeeting() {
    isRecording = false; 
    clearTimeout(chunkInterval);
    recBadge.style.display = 'none';
    releaseWakeLock(); 
    
    document.getElementById('btnStop').disabled = true;
    document.getElementById('btnStop').innerText = "⏳ 等待資料寫入中...";
    document.getElementById('btnPause').style.display = 'none';
    document.getElementById('btnResume').style.display = 'none';
    document.getElementById('btnSwitchSource').style.display = 'none';
    document.getElementById('btnToggleVideo').style.display = 'none';

    log("⏹️ 錄影結束，正在提取最後一段不到一分鐘的切片...");

    // 確保最後一個切片進入 activeProcessingTasks
    const onStopPromise = new Promise(resolve => {
      if (mediaRecorder && (mediaRecorder.state === "recording" || mediaRecorder.state === "paused")) {
        const originalOnStop = mediaRecorder.onstop;
        mediaRecorder.onstop = (e) => {
          if(originalOnStop) originalOnStop(e);
          resolve();
        };
        mediaRecorder.stop(); 
      } else resolve();
    });

    await onStopPromise;
    if (currentStream) currentStream.getTracks().forEach(track => track.stop());

    // 🏆 嚴格鎖定：等待雙軌 100% 寫完
    if (activeProcessingTasks.size > 0) {
      log(`⏳ 系統嚴格鎖定中：等待剩餘 ${activeProcessingTasks.size} 個辨識/建檔任務完全寫入試算表...`);
      while(activeProcessingTasks.size > 0) {
        await Promise.all(Array.from(activeProcessingTasks));
      }
    }

    log("✅ 所有切片資料已 100% 同步寫入試算表！");
    log("🧠 正在將狀態變更為「錄製完成」，並根據所有逐字稿產出總結...");
    
    try {
      const res = await callGasAPI({ 
        action: "finalizeMeeting", 
        rowIndex: meetingData.rowIndex,
        email: loggedInEmail
      });
      
      if (res.status === 'success') {
        log("🎉 會議紀錄統整完畢！");
        switchStep('step-result'); // 隱藏錄製區，顯示結果區
        document.getElementById('finalSummary').innerText = res.data.summary;
        document.getElementById('fullDetails').innerText = res.data.details;
      } else {
        log("❌ 最終總結產出失敗: " + res.message);
        document.getElementById('btnStop').innerText = "❌ 總結失敗";
      }
    } catch(err) {
      log("❌ 請求最終總結異常: " + err.message);
    }
  }
</script>

</body>
</html>
