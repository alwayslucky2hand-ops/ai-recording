<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GROWTHX｜Meet & Diary Recorder</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* 🍏 Apple-inspired 視覺美學變數 */
    :root { 
      --primary: #1d1d1f; --primary-hover: #434344;
      --accent: #0066cc; --accent-hover: #0077ed;
      --surface: #ffffff; --bg: #f5f5f7; --border: #d2d2d7;
      --text-main: #1d1d1f; --text-muted: #86868b;
      --font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    }
    * { box-sizing: border-box; }
    body { background-color: var(--bg); font-family: var(--font-family); padding: 40px 20px; color: var(--text-main); overflow-x: hidden; }
    
    .card-premium { background: var(--surface); border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); width: 100%; max-width: 800px; margin: auto; padding: 48px; transition: all 0.4s ease; }
    .step-section { display: none; opacity: 0; }
    .step-section.active { display: block; opacity: 1; animation: fadeIn 0.5s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    /* 影音播放器 */
    .video-container { position: relative; width: 100%; max-height: 480px; background: #000; border-radius: 18px; margin-bottom: 32px; overflow: hidden; box-shadow: 0 12px 24px rgba(0,0,0,0.15); }
    video { width: 100%; height: 100%; object-fit: cover; }
    .status-badge { position: absolute; top: 20px; right: 20px; background: rgba(255, 59, 48, 0.95); backdrop-filter: blur(4px); color: white; padding: 6px 14px; border-radius: 99px; font-weight: 600; font-size: 12px; display: none; z-index: 10; align-items: center; gap: 8px; }
    .pulse-dot { width: 8px; height: 8px; background-color: white; border-radius: 50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 1; } }
    
    .controls-overlay { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); background: rgba(29, 29, 31, 0.75); backdrop-filter: blur(20px); padding: 12px 28px; border-radius: 999px; display: flex; gap: 24px; opacity: 0; transition: opacity 0.4s ease; z-index: 20; }
    .video-container.active-controls .controls-overlay { opacity: 1; }
    .control-btn { background: none; border: none; color: white; cursor: pointer; padding: 12px; border-radius: 50%; display: flex; transition: all 0.25s; }
    .control-btn:hover { background: rgba(255, 255, 255, 0.15); transform: scale(1.05); }
    .control-btn.stop-btn:hover { background: rgba(255, 59, 48, 0.9); }
    
    .form-label { font-weight: 600; font-size: 14px; margin-bottom: 8px; }
    .form-control-lg { border-radius: 12px; border: 1.5px solid var(--border); padding: 16px; font-size: 15px; width: 100%; }
    .form-control-lg:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(0, 102, 204, 0.15); outline: none; }
    
    .btn-brand { background-color: var(--primary); color: white; font-weight: 600; padding: 14px 28px; border-radius: 12px; border: none; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.3s; width: 100%; }
    .btn-brand:hover:not(:disabled) { background-color: var(--primary-hover); transform: translateY(-1px); }
    .btn-brand:disabled { background-color: #e5e5ea; color: #aeaeb2; cursor: not-allowed; }
    .btn-outline { background-color: transparent; color: var(--primary); border: 1.5px solid var(--border); font-weight: 600; padding: 10px 20px; border-radius: 10px; display: flex; align-items: center; gap: 8px; transition: all 0.2s; }
    .btn-outline:hover:not(:disabled) { background-color: var(--bg); }
    
    .log-box { height: 140px; overflow-y: auto; background: var(--primary); color: #4ade80; padding: 16px; border-radius: 12px; font-family: monospace; font-size: 13px; }
    .result-editor { width: 100%; min-height: 350px; padding: 24px; border: 1.5px solid var(--border); border-radius: 16px; background: #fff; line-height: 1.8; overflow-y: auto; word-wrap: break-word; }
    
    .alert-box { background: rgba(255, 59, 48, 0.1); border: 1px solid rgba(255, 59, 48, 0.3); color: #d70015; padding: 16px; border-radius: 12px; font-size: 14px; margin-bottom: 20px; }
  </style>
</head>
<body>

<div class="card-premium">
  <div class="d-flex align-items-center justify-content-center gap-3 mb-4">
    <i data-lucide="layers" style="width: 32px; height: 32px; color: var(--primary);"></i>
    <h2 class="m-0 fw-bold" style="color: var(--primary); letter-spacing: -0.5px;">GROWTHX</h2>
  </div>

  <div id="step-login" class="step-section active">
    <h5 class="fw-bold mb-4 text-center">會員登入 / 註冊</h5>
    <div class="mb-3">
      <label class="form-label">工作信箱 Email</label>
      <input type="email" id="loginEmail" class="form-control form-control-lg" placeholder="name@company.com">
    </div>
    <div class="mb-4">
      <label class="form-label">姓名 / 公司名稱 (初次註冊用)</label>
      <input type="text" id="loginName" class="form-control form-control-lg" placeholder="您的姓名或公司名稱">
    </div>
    <button class="btn-brand" id="btnSendCode" onclick="sendCode()">取得驗證碼</button>
  </div>

  <div id="step-verify" class="step-section">
    <h5 class="fw-bold mb-4 text-center">輸入驗證碼</h5>
    <p class="text-center text-muted" style="font-size: 14px;">驗證碼已發送至您的信箱，請查收。</p>
    <div class="mb-4">
      <input type="text" id="verifyCode" class="form-control form-control-lg text-center" placeholder="6位數驗證碼" maxlength="6" style="letter-spacing: 4px; font-size: 20px;">
    </div>
    <button class="btn-brand" id="btnVerify" onclick="verifyLogin()">登入系統</button>
    <button class="btn-outline w-100 mt-3 justify-content-center" onclick="switchStep('step-login')">回上一步</button>
  </div>

  <div id="step-settings" class="step-section">
    <h5 class="fw-bold mb-3">系統綁定設定</h5>
    <div class="alert-box">
      <strong>⚠️ 權限提醒：</strong><br>
      請務必將您下方的「Google試算表」與「雲端資料夾」分享給以下 Email，並設為「編輯者」權限，否則系統無法為您寫入資料：<br>
      <strong style="user-select: all;">alwayslucky2hand@gmail.com</strong>
    </div>
    <div class="mb-3">
      <label class="form-label">Gemini API Key</label>
      <input type="text" id="setApiKey" class="form-control form-control-lg" placeholder="AIzaSy...">
    </div>
    <div class="mb-3">
      <label class="form-label">Google 試算表 (會議紀錄) 網址或 ID</label>
      <input type="text" id="setSheet" class="form-control form-control-lg" placeholder="貼上完整網址，系統會自動轉換">
    </div>
    <div class="mb-4">
      <label class="form-label">Google 雲端硬碟 (商用會議記錄) 資料夾網址或 ID</label>
      <input type="text" id="setFolder" class="form-control form-control-lg" placeholder="貼上完整網址，系統會自動轉換">
    </div>
    <button class="btn-brand" id="btnSaveSettings" onclick="saveSettings()">儲存並進入系統</button>
  </div>

  <div id="step-setup" class="step-section">
    <div class="video-container" id="videoContainer">
      <div id="recBadge" class="status-badge"><div class="pulse-dot"></div><span id="recText">REC</span></div>
      <video id="mediaPlayer" autoplay muted playsinline></video>
      <div class="controls-overlay" id="playerControls">
        <button class="control-btn stop-btn" id="btnStop" onclick="stopMeeting()" style="display:none;" title="結束會議">
          <i data-lucide="square" style="fill:currentColor;"></i>
        </button>
      </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
      <h5 class="fw-bold m-0">開啟新會議</h5>
      <button class="btn-outline py-1 px-3" style="font-size:13px;" onclick="fetchHistory()">調閱紀錄</button>
    </div>
    <div class="mb-3">
      <label class="form-label">本次會議單位</label>
      <input type="text" id="setupCompany" class="form-control form-control-lg" placeholder="例如：產品研發部">
    </div>
    <div class="mb-4">
      <label class="form-label">與會人員</label>
      <textarea id="setupAttendees" class="form-control form-control-lg" rows="2" placeholder="參與者姓名..."></textarea>
    </div>
    <button class="btn-brand" id="btnStartSetup" onclick="startMeeting()">啟動錄製</button>
  </div>

  <div id="step-history" class="step-section">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h5 class="fw-bold m-0">您的歷史紀錄</h5>
      <button class="btn-outline py-1 px-3" style="font-size:13px;" onclick="switchStep('step-setup')">返回</button>
    </div>
    <div id="historyList" style="max-height:400px; overflow-y:auto;"></div>
  </div>

  <div id="step-recording" class="step-section">
    <label class="form-label">系統執行日誌</label>
    <div id="systemLog" class="log-box mb-2">系統啟動中...<br></div>
  </div>

  <div id="step-result" class="step-section mt-2">
    <h5 class="fw-bold mb-3" style="color:var(--primary);">專業會議總結</h5>
    <div id="finalSummary" class="result-editor" contenteditable="true"></div>
    <div class="d-flex gap-3 mt-4 justify-content-end">
      <button class="btn-outline" onclick="switchStep('step-setup')">完成並返回</button>
      <button class="btn-brand" onclick="exportToDoc()" id="btnExportDoc">匯出 Google 文件</button>
    </div>
    <div id="docUrlText" class="mt-3 text-end" style="font-size: 14px; font-family: monospace; color: var(--accent);"></div>
  </div>
</div>

<script>
  lucide.createIcons();

  // ==========================================
  // ⚠️ 請在這裡貼上你重新部署後產生的 GAS URL
  // ==========================================
  const GAS_URL = "https://script.google.com/macros/s/AKfycbz3u8OWcBy5aPLff38_7kL0K7Jjjk8lOHx2b-WQEEdy1U7g01R9JHWlhMYLGoHM9_Iw/exec"; 

  // 全域變數
  let currentUserEmail = "";
  let currentStream = null;
  let mediaRecorder = null;
  let chunkInterval;
  let chunkIndex = 1;
  let meetingData = { folderId: '', rowIndex: 0, meetingName: '' };
  let isRecording = false;

  window.onload = () => {
    // 檢查是否有登入紀錄
    const savedEmail = localStorage.getItem('growthx_email');
    if (savedEmail) {
      currentUserEmail = savedEmail;
      switchStep('step-setup');
      acquireStream();
    } else {
      switchStep('step-login');
    }
  };

  function switchStep(stepId) {
    document.querySelectorAll('.step-section').forEach(el => el.classList.remove('active'));
    document.getElementById(stepId).classList.add('active');
  }

  function log(msg) {
    const box = document.getElementById('systemLog');
    box.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
    box.scrollTop = box.scrollHeight;
  }

  async function callGasAPI(payload) {
    try {
      const response = await fetch(GAS_URL, {
        method: "POST", redirect: "follow",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      });
      return await response.json();
    } catch (err) { throw new Error("網路請求失敗：" + err.message); }
  }

  // ==========================================
  // 🔐 登入與設定邏輯
  // ==========================================
  async function sendCode() {
    const email = document.getElementById('loginEmail').value;
    const name = document.getElementById('loginName').value;
    if (!email) return alert("請輸入信箱");
    
    const btn = document.getElementById('btnSendCode');
    btn.disabled = true; btn.innerText = "發送中...";
    try {
      await callGasAPI({ action: "sendVerifyCode", email: email, name: name });
      switchStep('step-verify');
    } catch(e) { alert(e.message); }
    btn.disabled = false; btn.innerText = "取得驗證碼";
  }

  async function verifyLogin() {
    const email = document.getElementById('loginEmail').value;
    const code = document.getElementById('verifyCode').value;
    if (!code) return alert("請輸入驗證碼");

    const btn = document.getElementById('btnVerify');
    btn.disabled = true; btn.innerText = "驗證中...";
    try {
      const res = await callGasAPI({ action: "verifyLogin", email: email, code: code });
      if (res.status === 'success') {
        currentUserEmail = email;
        localStorage.setItem('growthx_email', email);
        if (res.data.hasSettings) {
          switchStep('step-setup');
          acquireStream();
        } else {
          switchStep('step-settings');
        }
      } else throw new Error(res.message);
    } catch(e) { alert(e.message); }
    btn.disabled = false; btn.innerText = "登入系統";
  }

  // ✨ 神奇的 ID 擷取器 (正規表達式)
  function extractId(input, type) {
    if (!input.includes('http')) return input; // 如果本身就是 ID 就直接回傳
    try {
      if (type === 'sheet') {
        const match = input.match(/\/d\/([a-zA-Z0-9-_]+)/);
        return match ? match[1] : input;
      }
      if (type === 'folder') {
        const match = input.match(/folders\/([a-zA-Z0-9-_]+)/) || input.match(/id=([a-zA-Z0-9-_]+)/);
        return match ? match[1] : input;
      }
    } catch(e) { return input; }
    return input;
  }

  async function saveSettings() {
    const apiKey = document.getElementById('setApiKey').value;
    const rawSheet = document.getElementById('setSheet').value;
    const rawFolder = document.getElementById('setFolder').value;
    
    if(!apiKey || !rawSheet || !rawFolder) return alert("請填寫完整設定");

    // 自動擷取 ID
    const sheetId = extractId(rawSheet, 'sheet');
    const folderId = extractId(rawFolder, 'folder');

    const btn = document.getElementById('btnSaveSettings');
    btn.disabled = true; btn.innerText = "儲存中...";
    try {
      const res = await callGasAPI({ action: "updateSettings", email: currentUserEmail, apiKey: apiKey, sheetId: sheetId, folderId: folderId });
      if(res.status === 'success') {
        alert("設定成功！請開始使用系統。");
        switchStep('step-setup');
        acquireStream();
      } else throw new Error(res.message);
    } catch(e) { alert(e.message); }
    btn.disabled = false; btn.innerText = "儲存並進入系統";
  }

  // ==========================================
  // 🎬 會議錄製邏輯
  // ==========================================
  async function acquireStream() {
    try {
      currentStream = await navigator.mediaDevices.getUserMedia({ video: { ideal: 1280 }, audio: true });
      document.getElementById('mediaPlayer').srcObject = currentStream;
      document.getElementById('videoContainer').style.display = 'block';
    } catch (e) { alert("請允許相機與麥克風權限"); }
  }

  async function startMeeting() {
    const company = document.getElementById('setupCompany').value;
    const attendees = document.getElementById('setupAttendees').value;
    if (!company) return alert("請填寫會議單位");

    document.getElementById('btnStartSetup').disabled = true;
    try {
      const res = await callGasAPI({ action: "initMeeting", email: currentUserEmail, company: company, attendees: attendees });
      if (res.status === 'success') {
        meetingData = res.data;
        switchStep('step-recording');
        document.getElementById('videoContainer').classList.add('active-controls');
        document.getElementById('btnStop').style.display = 'flex';
        document.getElementById('recBadge').style.display = 'flex';
        
        isRecording = true; chunkIndex = 1;
        startChunkRecording();
        log("錄製開始，同步雲端傳輸中...");
      } else throw new Error(res.message);
    } catch(e) { alert(e.message); document.getElementById('btnStartSetup').disabled = false; }
  }

  function startChunkRecording() {
    if (!isRecording || !currentStream) return;
    let chunks = [];
    mediaRecorder = new MediaRecorder(currentStream, { mimeType: 'video/webm' });
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    mediaRecorder.onstop = () => {
      if (chunks.length > 0) {
        processAndUpload(new Blob(chunks, { type: 'video/webm' }), 'video/webm', chunkIndex);
        chunkIndex++;
      }
      if (isRecording) startChunkRecording();
    };
    mediaRecorder.start();
    chunkInterval = setTimeout(() => { if (mediaRecorder.state === "recording") mediaRecorder.stop(); }, 60000); // 1分鐘切片
  }

  function processAndUpload(blob, mimeType, idx) {
    log(`區段 ${idx} 背景傳輸與 AI 分析中...`);
    const reader = new FileReader();
    reader.readAsDataURL(blob);
    reader.onloadend = async () => {
      const base64Data = reader.result.split(',')[1];
      callGasAPI({ action: "saveDrive", email: currentUserEmail, base64Data: base64Data, mimeType: mimeType, folderId: meetingData.folderId, rowIndex: meetingData.rowIndex, chunkIndex: idx });
      callGasAPI({ action: "recognizeAI", email: currentUserEmail, base64Data: base64Data, mimeType: mimeType, rowIndex: meetingData.rowIndex, chunkIndex: idx });
    };
  }

  async function stopMeeting() {
    isRecording = false;
    clearTimeout(chunkInterval);
    if(mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
    document.getElementById('recBadge').style.display = 'none';
    document.getElementById('btnStop').style.display = 'none';
    log("結束錄影，產出最終會議摘要...");
    
    try {
      const res = await callGasAPI({ action: "finalizeMeeting", email: currentUserEmail, rowIndex: meetingData.rowIndex });
      if(res.status === 'success') {
        switchStep('step-result');
        document.getElementById('finalSummary').innerHTML = res.data.summary.replace(/\n/g, '<br>') + '<hr><b>詳細紀錄：</b><br>' + res.data.details.replace(/\n/g, '<br>');
      }
    } catch(e) { log("總結失敗：" + e.message); }
  }

  // ==========================================
  // 📜 歷史調閱與匯出
  // ==========================================
  async function fetchHistory() {
    const btn = event.target; btn.disabled = true; btn.innerText = "載入中...";
    try {
      const res = await callGasAPI({ action: "fetchHistory", email: currentUserEmail });
      if(res.status === 'success' && res.data.length > 0) {
        let html = '';
        res.data.forEach(item => {
          html += `<div style="border:1px solid #ddd; padding:15px; border-radius:10px; margin-bottom:10px;">
            <b>${item.date} ${item.time} - ${item.company}</b><br>
            <a href="${item.urls.split(',')[0]}" target="_blank" style="font-size:12px; color:var(--accent);">觀看雲端影片</a>
          </div>`;
        });
        document.getElementById('historyList').innerHTML = html;
        switchStep('step-history');
      } else { alert("尚無紀錄"); }
    } catch(e) { alert(e.message); }
    btn.disabled = false; btn.innerText = "調閱紀錄";
  }

  async function exportToDoc() {
    const btn = document.getElementById('btnExportDoc');
    btn.disabled = true; btn.innerText = "建立中...";
    try {
      const content = document.getElementById('finalSummary').innerText;
      const res = await callGasAPI({ action: "createDoc", email: currentUserEmail, meetingName: meetingData.meetingName, summary: content, details: "參見系統記錄", folderId: meetingData.folderId });
      if(res.status === 'success') {
        document.getElementById('docUrlText').innerHTML = `建立成功！<a href="${res.data}" target="_blank">點此開啟 Google 文件</a>`;
      }
    } catch(e) { alert(e.message); }
    btn.disabled = false; btn.innerText = "匯出 Google 文件";
  }
</script>
</body>
</html>
